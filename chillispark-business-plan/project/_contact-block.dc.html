<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<section style="background:#0B0B0F;padding:90px 0;">
  <div style="max-width:1120px;margin:0 auto;padding:0 26px;display:grid;grid-template-columns:1fr 1fr;gap:56px;align-items:start;">
    <div>
      <span style="color:#9E93FF;font-weight:700;font-size:14px;letter-spacing:.06em;text-transform:uppercase;">Get started</span>
      <h2 style="font-family:'Bricolage Grotesque';font-weight:800;color:#fff;font-size:clamp(34px,4.6vw,58px);line-height:1;letter-spacing:-.02em;margin:14px 0 0;">Tell us about<br>your business.</h2>
      <p style="color:rgba(255,255,255,.72);font-size:17px;line-height:1.6;margin:22px 0 34px;max-width:420px;">A quick message and we'll get back with ideas, timeline and a clear quote. No pressure, no jargon.</p>
      <div style="display:flex;flex-direction:column;gap:14px;">
        <a href="tel:+919876543210" style="display:flex;align-items:center;gap:14px;background:#16161C;border:1px solid #24242C;border-radius:14px;padding:16px 20px;text-decoration:none;">
          <span style="width:40px;height:40px;border-radius:10px;background:var(--accent,#5B46F0);display:flex;align-items:center;justify-content:center;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 5c0 8 7 15 15 15l2.5-3.5-4.5-2-1.5 2c-3-1.2-5.8-4-7-7l2-1.5-2-4.5L4 5z" stroke="#fff" stroke-width="1.7" stroke-linejoin="round"/></svg></span>
          <span><span style="display:block;color:#8A8A96;font-size:13px;">Call us</span><span style="color:#fff;font-weight:600;font-size:16px;">+91 98765 43210</span></span>
        </a>
        <a href="https://wa.me/919876543210" style="display:flex;align-items:center;gap:14px;background:#16161C;border:1px solid #24242C;border-radius:14px;padding:16px 20px;text-decoration:none;">
          <span style="width:40px;height:40px;border-radius:10px;background:#25D366;display:flex;align-items:center;justify-content:center;"><svg width="19" height="19" viewBox="0 0 24 24" fill="#fff"><path d="M12 2a10 10 0 0 0-8.6 15l-1.4 5 5.2-1.4A10 10 0 1 0 12 2zm5.3 14.1c-.2.6-1.3 1.2-1.8 1.2-.5.1-1 .1-1.7-.1-.4-.1-1-.3-1.6-.6-2.9-1.2-4.7-4.1-4.9-4.3-.1-.2-1.1-1.5-1.1-2.8 0-1.3.7-2 .9-2.2.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .6.5.2.5.7 1.8.8 1.9.1.1.1.3 0 .5-.1.2-.2.4-.3.5l-.5.5c-.2.2-.3.3-.1.6.2.3.9 1.4 1.9 2.3 1.3 1.1 2.3 1.5 2.6 1.6.3.1.5.1.6-.1.2-.2.7-.8.9-1.1.2-.3.4-.2.6-.1.2.1 1.5.7 1.7.9.3.1.4.2.5.3 0 .1 0 .6-.3 1.2z"/></svg></span>
          <span><span style="display:block;color:#8A8A96;font-size:13px;">WhatsApp</span><span style="color:#fff;font-weight:600;font-size:16px;">Chat with us</span></span>
        </a>
        <a href="mailto:hello@chillispark.in" style="display:flex;align-items:center;gap:14px;background:#16161C;border:1px solid #24242C;border-radius:14px;padding:16px 20px;text-decoration:none;">
          <span style="width:40px;height:40px;border-radius:10px;background:#24242C;display:flex;align-items:center;justify-content:center;"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="14" rx="2" stroke="#fff" stroke-width="1.7"/><path d="m4 7 8 6 8-6" stroke="#fff" stroke-width="1.7"/></svg></span>
          <span><span style="display:block;color:#8A8A96;font-size:13px;">Email</span><span style="color:#fff;font-weight:600;font-size:16px;">hello@chillispark.in</span></span>
        </a>
      </div>
    </div>
    <div style="background:#fff;border-radius:22px;padding:34px;">
      <sc-if value="{{ submitted }}" hint-placeholder-val="{{ false }}">
        <div style="text-align:center;padding:40px 10px;">
          <div style="width:64px;height:64px;border-radius:50%;background:#EAF7EF;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;"><svg width="30" height="30" viewBox="0 0 24 24" fill="none"><path d="m5 12 4 4 10-10" stroke="#16B981" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
          <h3 style="font-family:'Bricolage Grotesque';font-weight:700;font-size:24px;margin:0 0 8px;">Thanks — message sent!</h3>
          <p style="color:#5A5A66;font-size:15.5px;margin:0;">We'll get back to you within one business day.</p>
        </div>
      </sc-if>
      <sc-if value="{{ notSubmitted }}" hint-placeholder-val="{{ true }}">
        <form onSubmit="{{ submit }}">
          <label style="display:block;font-family:'Bricolage Grotesque';font-weight:600;font-size:13px;color:#0B0B0F;margin:0 0 6px;">Your name</label>
          <input required placeholder="Jane Sharma" style="width:100%;padding:13px 15px;border:1px solid #E4E4EB;border-radius:11px;font-size:15px;font-family:'Bricolage Grotesque';margin:0 0 16px;outline:none;">
          <label style="display:block;font-family:'Bricolage Grotesque';font-weight:600;font-size:13px;color:#0B0B0F;margin:0 0 6px;">Business name</label>
          <input placeholder="Bright Smile Dental" style="width:100%;padding:13px 15px;border:1px solid #E4E4EB;border-radius:11px;font-size:15px;font-family:'Bricolage Grotesque';margin:0 0 16px;outline:none;">
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
            <div><label style="display:block;font-family:'Bricolage Grotesque';font-weight:600;font-size:13px;margin:0 0 6px;">Email</label>
            <input type="email" required placeholder="you@email.com" style="width:100%;padding:13px 15px;border:1px solid #E4E4EB;border-radius:11px;font-size:15px;font-family:'Bricolage Grotesque';margin:0 0 16px;outline:none;"></div>
            <div><label style="display:block;font-family:'Bricolage Grotesque';font-weight:600;font-size:13px;margin:0 0 6px;">Phone</label>
            <input placeholder="+91 ..." style="width:100%;padding:13px 15px;border:1px solid #E4E4EB;border-radius:11px;font-size:15px;font-family:'Bricolage Grotesque';margin:0 0 16px;outline:none;"></div>
          </div>
          <label style="display:block;font-family:'Bricolage Grotesque';font-weight:600;font-size:13px;margin:0 0 6px;">What do you need?</label>
          <textarea rows="3" placeholder="I run a dental clinic and need a modern website..." style="width:100%;padding:13px 15px;border:1px solid #E4E4EB;border-radius:11px;font-size:15px;font-family:'Bricolage Grotesque';margin:0 0 20px;outline:none;resize:vertical;"></textarea>
          <button type="submit" style="width:100%;display:inline-flex;align-items:center;justify-content:center;gap:10px;background:#0B0B0F;color:#fff;font-weight:700;font-size:16px;padding:15px;border-radius:999px;border:none;cursor:pointer;font-family:'Bricolage Grotesque';">
            Send message
            <span style="width:24px;height:24px;border-radius:50%;background:var(--accent,#5B46F0);display:inline-flex;align-items:center;justify-content:center;"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M7 17 17 7M8 7h9v9" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          </button>
        </form>
      </sc-if>
    </div>
  </div>
</section>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;$preview&quot;:{&quot;width&quot;:1120,&quot;height&quot;:620}}">
class Component extends DCLogic {
  state = { submitted: false };
  submit(e) { if (e && e.preventDefault) e.preventDefault(); this.setState({ submitted: true }); }
  renderVals() {
    return {
      submitted: this.state.submitted,
      notSubmitted: !this.state.submitted,
      submit: (e) => this.submit(e),
    };
  }
}
</script>
</body>
</html>
